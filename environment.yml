name: aidas
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - -r requirements.txt

# Notes:
# - This file uses conda only to create the Python environment.
# - All application runtime and executable build packages are installed with
#   pip from requirements.txt to avoid mixing conda and pip libraries.
# - To create the environment locally:
#
# conda env create -f environment.yml
# conda activate aidas
