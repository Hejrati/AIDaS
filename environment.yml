name: aidas-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy=2.2.6
  - scipy=1.15.2
  - matplotlib=3.10.8
  - pillow>=10.0
  - xarray
  - pyside6
  - contourpy=1.3.2
  - cycler=0.12.1
  - fonttools=4.62.1
  - kiwisolver=1.5.0
  - packaging=26.1
  - pyparsing=3.3.2
  - python-dateutil=2.9.0.post0
  - tornado=6.5.5
  - typeguard=4.5.1
  - typing_extensions=4.15.0
  - unicodedata2=17.0.1
  - pip
  - pip:
    - pyreadr
    - torch
    - torchvision

# Notes:
# - This file is for the main AIDaS app and the newer AI_ForAIDAS PyTorch model.
# - The legacy OCT Segmenter wheels require Python 3.10 and TensorFlow 2.9;
#   install them with `environment-oct-segmenter-legacy.yml` instead.
# - If you prefer everything via pip, run `pip install -r requirements.txt`.
# - To create the environment locally:
#
# conda env create -f environment.yml
# conda activate aidas-env
