name: Build and publish AIDaS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows installer
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate tag and calculate release names
        id: metadata
        shell: pwsh
        run: |
          python tools/release_metadata.py `
            --tag "${{ github.ref_name }}" `
            --github-output "$env:GITHUB_OUTPUT"

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build the PyInstaller executable
        shell: pwsh
        run: python -m PyInstaller AIDaS.spec --clean --noconfirm

      - name: Smoke-test the packaged ONNX worker
        shell: pwsh
        run: python tools/smoke_test_binary.py dist/AIDaS.exe

      - name: Optionally sign the application executable
        id: signing
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PASSWORD)
          if (-not $hasCertificate -and -not $hasPassword) {
            Write-Warning "Code-signing secrets are not configured; publishing an unsigned release."
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          if (-not $hasCertificate -or -not $hasPassword) {
            throw "Both WINDOWS_SIGNING_CERTIFICATE_BASE64 and WINDOWS_SIGNING_CERTIFICATE_PASSWORD are required."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "aidas-code-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64)
          )
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signTool) {
            throw "SignTool was not found on the GitHub Actions runner."
          }

          & $signTool sign /fd SHA256 /td SHA256 `
            /tr "http://timestamp.digicert.com" `
            /f $certificatePath /p $env:SIGNING_CERTIFICATE_PASSWORD `
            "dist\AIDaS.exe"
          if ($LASTEXITCODE -ne 0) { throw "Signing AIDaS.exe failed." }

          "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "certificate_path=$certificatePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sign_tool=$signTool" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build the Inno Setup installer
        shell: pwsh
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          FILE_VERSION: ${{ steps.metadata.outputs.file_version }}
        run: |
          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "Inno Setup compiler ISCC.exe was not found."
          }
          & $iscc "/DMyAppVersion=$env:VERSION" `
            "/DMyAppFileVersion=$env:FILE_VERSION" `
            "installer\AIDaS.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed." }

      - name: Optionally sign the installer
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          INSTALLER_NAME: ${{ steps.metadata.outputs.installer_name }}
        run: |
          & "${{ steps.signing.outputs.sign_tool }}" sign /fd SHA256 /td SHA256 `
            /tr "http://timestamp.digicert.com" `
            /f "${{ steps.signing.outputs.certificate_path }}" `
            /p $env:SIGNING_CERTIFICATE_PASSWORD `
            (Join-Path "release" $env:INSTALLER_NAME)
          if ($LASTEXITCODE -ne 0) { throw "Signing the installer failed." }

      - name: Create SHA-256 checksum
        shell: pwsh
        env:
          INSTALLER_NAME: ${{ steps.metadata.outputs.installer_name }}
        run: |
          $installer = Join-Path "release" $env:INSTALLER_NAME
          if (-not (Test-Path -LiteralPath $installer)) {
            throw "Expected installer was not created: $installer"
          }
          $digest = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          "$digest  $env:INSTALLER_NAME" |
            Set-Content -LiteralPath "$installer.sha256" -Encoding ascii -NoNewline

      - name: Publish the GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
          INSTALLER_NAME: ${{ steps.metadata.outputs.installer_name }}
          IS_PRERELEASE: ${{ steps.metadata.outputs.prerelease }}
        run: |
          $installer = Join-Path "release" $env:INSTALLER_NAME
          $arguments = @(
            "release", "create", "${{ github.ref_name }}",
            $installer, "$installer.sha256",
            "--verify-tag",
            "--generate-notes",
            "--title", "AIDaS $env:VERSION"
          )
          if ($env:IS_PRERELEASE -eq "true") {
            $arguments += "--prerelease"
          }
          gh @arguments
