name: oct-segmenter-legacy-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - git
  - pip:
    - -r requirements-oct-segmenter-legacy.txt

# Notes:
# - This environment is only for the old Keras/TensorFlow OCT Segmenter backend.
# - It is kept separate because TensorFlow 2.9 is not compatible with the
#   Python 3.11 environment used by the main AIDaS app.
# - To create it from the repository root:
#
# conda env create -f environment-oct-segmenter-legacy.yml
# conda activate oct-segmenter-legacy-env
